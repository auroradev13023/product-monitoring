<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DropGuard – AIO Product Drop Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <!-- ── SIDEBAR ─────────────────────────── -->
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <div class="brand-mark">DG</div>
          <div>
            <strong>DropGuard</strong>
            <span>AIO Monitor · v0.1</span>
          </div>
        </div>

        <nav class="nav" id="sidebar-nav">
          <a class="nav-link" data-page="dashboard">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor"/></svg>
            Dashboard
          </a>
          <a class="nav-link" data-page="monitors">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="2.5" fill="currentColor"/></svg>
            Monitors
            <span class="nav-badge" id="badge-monitors">0</span>
          </a>
          <a class="nav-link" data-page="checkout">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M2 3h1.5l2 7h7l1.5-4.5H5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7" cy="13" r="1" fill="currentColor"/><circle cx="11" cy="13" r="1" fill="currentColor"/></svg>
            Checkout Assist
          </a>
          <a class="nav-link" data-page="profiles">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M2.5 13.5c0-3.037 2.462-5.5 5.5-5.5s5.5 2.463 5.5 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Profiles
          </a>
          <a class="nav-link" data-page="alerts">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 1.5C5.515 1.5 3.5 3.515 3.5 6v5.5H2v1h4a2 2 0 0 0 4 0h4v-1h-1.5V6c0-2.485-2.015-4.5-4.5-4.5z" fill="currentColor" opacity=".9"/></svg>
            Alerts
            <span class="nav-badge nav-badge--alert" id="badge-alerts">0</span>
          </a>
          <a class="nav-link" data-page="logs">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M2 4h12M2 8h9M2 12h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Logs
          </a>
          <a class="nav-link" data-page="settings">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.34 3.34l1.41 1.41M11.25 11.25l1.41 1.41M3.34 12.66l1.41-1.41M11.25 4.75l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Settings
          </a>
        </nav>

        <div class="sidebar-footer">
          <div class="engine-status" id="engine-status">
            <span class="pulse-dot" id="engine-dot"></span>
            <span id="engine-label">Engine running</span>
          </div>
          <span class="pill success" style="margin-top:10px;display:inline-flex">Compliant Mode</span>
        </div>
      </aside>

      <!-- ── CONTENT ────────────────────────── -->
      <div class="content-wrapper">
        <header class="topbar">
          <div class="topbar-left">
            <button class="icon-btn" id="menu-toggle" aria-label="Toggle sidebar">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 4h14M2 9h14M2 14h14" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
            </button>
            <h2 id="page-title">Dashboard</h2>
          </div>
          <div class="topbar-right">
            <button class="button ghost small" id="btn-pause-all">Pause All</button>
            <button class="button primary small" id="btn-simulate">⚡ Simulate Drop</button>
          </div>
        </header>

        <main id="main-content" class="main-content"></main>
      </div>
    </div>

    <!-- ── MODAL ─────────────────────────────── -->
    <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal" id="modal-box">
        <div class="modal-head">
          <h3 id="modal-title"></h3>
          <button class="icon-btn modal-close" id="modal-close-btn" aria-label="Close">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-foot">
          <button class="button ghost" id="modal-cancel-btn">Cancel</button>
          <button class="button primary" id="modal-save-btn">Save</button>
        </div>
      </div>
    </div>

    <!-- ── TOAST ─────────────────────────────── -->
    <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="./app.js"></script>
  </body>
</html>
